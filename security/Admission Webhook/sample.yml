apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: "pod-policy.example.com"

webhooks:
- name: "pod-policy.example.com"
  clientConfig:
    url: "https://etc.com"
    or
    service:
      namespace: "wehook-namespace"
      name: "webhook-service"
    caBundle: "Ci109LSa///50k"
  rules:
  - apiGroup: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
    scope: "Namespaced"