apiVersion: v1
kind: Pod
metadata:
  name: myapp Pod
  labels:
    app: myapp
    placeholder_anylabel: location

spec:
  containers:
    - name: nginx-container
      image: nginx
      
      resources:
        requests:
          memory: "4Gi"
          cpu: 2
        limits:
          memory: "2Gi"
          cpu: 2